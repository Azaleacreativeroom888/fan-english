<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>English Notes Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f6f6f6;
      color: #222;
    }

    header {
      background: #111;
      color: #fff;
      padding: 30px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .post {
      background: #fff;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .date {
      font-size: 12px;
      color: #777;
      margin-bottom: 10px;
    }

    .title {
      font-size: 18px;
      margin: 0 0 10px 0;
    }

    .block {
      margin-top: 10px;
    }

    .label {
      font-weight: bold;
      font-size: 13px;
    }

    code {
      background: #eee;
      padding: 2px 4px;
      border-radius: 4px;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #777;
      padding: 20px;
    }

    a {
      color: #111;
    }
  </style>
</head>

<body>

<header>
  <h1>English Mini Notes</h1>
  <p>漫画翻訳に使う英語知識メモ</p>
</header>

<div class="container">

  <div class="post">
    <h2 class="title">アルファベットはAlfaとBeta！？</h2>

    <div class="block">
      <div class="label">記事</div>
      <p>ギリシャ語の最初の2文字が α（alpha）とβ（beta）それをまとめて呼んだのが alphabet</p>
    </div>
  </div>

  <!-- 記事テンプレ -->
  
  <div class="post">
    <h2 class="title">“actually”は「実は」だけじゃない</h2>

    <div class="block">
      <div class="label">意味</div>
      <p>期待と違う事実を軽く修正するニュアンス</p>
    </div>

    <div class="block">
      <div class="label">例文</div>
      <p>I actually like it.（意外とそれ好き）</p>
    </div>

    <div class="block">
      <div class="label">翻訳での注意</div>
      <p>「実は」だと重すぎることがある</p>
    </div>
  </div>

  <!-- 追加記事はここにコピペで増やす -->

</div>

<footer>
  <a href="index.html">← Home</a>
</footer>

</body>
</html>
