<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Translation Log</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f6f6f6;
      color: #222;
    }

    header {
      background: #111;
      color: #fff;
      padding: 30px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .entry {
      background: #fff;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .meta {
      font-size: 12px;
      color: #777;
      margin-bottom: 10px;
    }

    .title {
      font-size: 18px;
      margin: 0 0 10px 0;
    }

    .section {
      margin-top: 10px;
    }

    .label {
      font-weight: bold;
      font-size: 13px;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #777;
      padding: 20px;
    }

    a {
      color: #111;
    }
  </style>
</head>

<body>

<header>
  <h1>漫画翻訳ログ</h1>
  <p>どう訳したか・なぜそうしたかの記録</p>
</header>

<div class="container">

  <!-- 記事テンプレ -->
  <div class="entry">
    <div class="meta">2026/04/20 · Chapter 1</div>
    <h2 class="title">「このセリフどう訳す問題」</h2>

    <div class="section">
      <div class="label">原文</div>
      <p>（ここに日本語 or 英語原文）</p>
    </div>

    <div class="section">
      <div class="label">翻訳</div>
      <p>（自分の翻訳）</p>
    </div>

    <div class="section">
      <div class="label">判断メモ</div>
      <p>
        なぜこの訳にしたか／ニュアンス／文化差など
      </p>
    </div>
  </div>

  <!-- 追加記事はここにコピペで増やす -->

</div>

<footer>
  <a href="index.html">← Home</a>
</footer>

</body>
</html>
